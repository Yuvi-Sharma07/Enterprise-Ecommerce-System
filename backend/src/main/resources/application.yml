spring:
  profiles:
    active: dev
  application:
    name: backend

---
# Development Profile (H2 + In-memory Caching fallback)
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:h2:mem:ecommdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: password
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  cache:
    type: simple # Fallback to in-memory CacheManager
  mail:
    host: smtp.mailtrap.io
    port: 2525
    username: mock_user
    password: mock_password
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

app:
  jwt:
    secret: 9a6ZpG5xK9a6ZpG5xK9a6ZpG5xK9a6ZpG5xK9a6ZpG5xK9a6ZpG5xK9a6ZpG5xK
    accessTokenExpirationMs: 3600000     # 1 hour
    refreshTokenExpirationMs: 604800000   # 7 days
  stripe:
    secretKey: sk_test_mock_secret_key_123456789
    publishableKey: pk_test_mock_pub_key_123456789
  mail:
    from: noreply@enterprise-ecomm.com

server:
  port: 8080

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

---
# Production Profile (PostgreSQL + Redis + Stripe)
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:ecomm}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  cache:
    type: redis
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_HOST_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

app:
  jwt:
    secret: ${JWT_SECRET:9a6ZpG5xK9a6ZpG5xK9a6ZpG5xK9a6ZpG5xK9a6ZpG5xK9a6ZpG5xK9a6ZpG5xK}
    accessTokenExpirationMs: 3600000     # 1 hour
    refreshTokenExpirationMs: 604800000   # 7 days
  stripe:
    secretKey: ${STRIPE_SECRET_KEY}
    publishableKey: ${STRIPE_PUBLISHABLE_KEY}
  mail:
    from: ${MAIL_FROM:noreply@enterprise-ecomm.com}

server:
  port: 8080
