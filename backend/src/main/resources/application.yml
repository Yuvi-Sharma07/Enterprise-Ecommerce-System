spring:
  profiles:
    active: dev
  application:
    name: backend

---
# ==========================
# Development Profile (H2)
# ==========================

spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:h2:mem:ecommdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: password

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  cache:
    type: simple

  mail:
    host: smtp.mailtrap.io
    port: 2525
    username: mock_user
    password: mock_password
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

app:
  jwt:
    secret: 9a6ZpG5xK9a6ZpG5xK9a6ZpG5xK9a6ZpG5xK9a6ZpG5xK9a6ZpG5xK9a6ZpG5xK
    accessTokenExpirationMs: 3600000
    refreshTokenExpirationMs: 604800000

  stripe:
    secretKey: sk_test_mock_secret_key_123456789
    publishableKey: pk_test_mock_pub_key_123456789

  mail:
    from: noreply@enterprise-ecomm.com

server:
  port: 8080

springdoc:
  api-docs:
    path: /v3/api-docs

  swagger-ui:
    path: /swagger-ui.html

---
# ==========================
# Production Profile
# ==========================

spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: false

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST}
      port: ${SPRING_DATA_REDIS_PORT}
      password: ${SPRING_DATA_REDIS_PASSWORD}
      ssl:
        enabled: true

  cache:
    type: redis

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}

    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

app:
  jwt:
    secret: ${JWT_SECRET}
    accessTokenExpirationMs: 3600000
    refreshTokenExpirationMs: 604800000

  stripe:
    secretKey: ${STRIPE_SECRET_KEY:}
    publishableKey: ${STRIPE_PUBLISHABLE_KEY:}

  mail:
    from: ${MAIL_FROM:noreply@enterprise-ecomm.com}

server:
  port: ${PORT:8080}
