<div class="min-h-[85vh] flex items-center justify-center px-4 py-8">
  <div class="glass max-w-xl w-full p-8 rounded-2xl shadow-2xl space-y-6">
    <div class="text-center space-y-2">
      <div class="inline-flex p-3 bg-indigo-500/10 rounded-full text-indigo-400">
        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"/></svg>
      </div>
      <h2 class="text-3xl font-extrabold tracking-tight text-slate-900 dark:text-white">Create Credentials</h2>
      <p class="text-sm text-slate-505 dark:text-slate-400">Join our enterprise supply chain platform</p>
    </div>

    @if (error()) {
      <div class="bg-rose-500/15 border border-rose-500/30 text-rose-500 dark:text-rose-400 text-sm p-3 rounded-lg text-center font-semibold">
        {{ error() }}
      </div>
    }

    @if (success()) {
      <div class="bg-emerald-500/15 border border-emerald-500/30 text-emerald-600 dark:text-emerald-400 text-sm p-3 rounded-lg text-center flex items-center justify-center gap-2 font-semibold">
        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l5-5z" clip-rule="evenodd"/></svg>
        {{ success() }}
      </div>
    }

    <form (ngSubmit)="onSubmit()" class="space-y-4">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-semibold text-slate-705 dark:text-slate-300 mb-1">Email Address</label>
          <input
            type="email"
            required
            name="email"
            [(ngModel)]="email"
            class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-300 dark:border-slate-800 rounded-lg px-4 py-2 text-slate-905 dark:text-white focus:outline-none focus:border-indigo-500 transition"
            placeholder="name@domain.com"
          />
        </div>
        <div>
          <label class="block text-sm font-semibold text-slate-705 dark:text-slate-300 mb-1">Password</label>
          <input
            type="password"
            required
            name="password"
            [(ngModel)]="password"
            class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-300 dark:border-slate-800 rounded-lg px-4 py-2 text-slate-905 dark:text-white focus:outline-none focus:border-indigo-500 transition"
            placeholder="Min 6 characters"
          />
        </div>
      </div>

      <div>
        <label class="block text-sm font-semibold text-slate-705 dark:text-slate-300 mb-1">Assign User Role</label>
        <select
          name="role"
          [(ngModel)]="role"
          class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-300 dark:border-slate-800 rounded-lg px-4 py-2 text-slate-705 dark:text-white focus:outline-none focus:border-indigo-500 transition"
        >
          <option value="CUSTOMER">Customer (Retail Portal)</option>
          <option value="WAREHOUSE_MANAGER">Warehouse Manager (Stock & Logistics)</option>
          <option value="SUPPLIER">Supplier (Procurement & Fulfillments)</option>
          <option value="ADMIN">Administrator (Full Dashboard Access)</option>
        </select>
      </div>

      @if (role === 'CUSTOMER') {
        <div class="space-y-4 border-t border-slate-200 dark:border-slate-800 pt-4">
          <h3 class="text-sm font-bold text-indigo-600 dark:text-indigo-400 uppercase tracking-wider">Customer Profile Details</h3>
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block text-sm font-semibold text-slate-700 dark:text-slate-305 mb-1">First Name</label>
              <input
                type="text"
                required
                name="firstName"
                [(ngModel)]="firstName"
                class="w-full bg-slate-55 dark:bg-slate-900 border border-slate-300 dark:border-slate-800 rounded-lg px-4 py-2 text-slate-905 dark:text-white focus:outline-none focus:border-indigo-500 transition"
                placeholder="John"
              />
            </div>
            <div>
              <label class="block text-sm font-semibold text-slate-700 dark:text-slate-305 mb-1">Last Name</label>
              <input
                type="text"
                required
                name="lastName"
                [(ngModel)]="lastName"
                class="w-full bg-slate-55 dark:bg-slate-900 border border-slate-300 dark:border-slate-800 rounded-lg px-4 py-2 text-slate-905 dark:text-white focus:outline-none focus:border-indigo-500 transition"
                placeholder="Doe"
              />
            </div>
          </div>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
              <label class="block text-sm font-semibold text-slate-700 dark:text-slate-305 mb-1">Phone Number</label>
              <input
                type="text"
                name="phone"
                [(ngModel)]="phone"
                class="w-full bg-slate-55 dark:bg-slate-900 border border-slate-300 dark:border-slate-800 rounded-lg px-4 py-2 text-slate-905 dark:text-white focus:outline-none focus:border-indigo-500 transition"
                placeholder="+1 555-0199"
              />
            </div>
            <div>
              <label class="block text-sm font-semibold text-slate-700 dark:text-slate-305 mb-1">Shipping Address</label>
              <input
                type="text"
                name="address"
                [(ngModel)]="address"
                class="w-full bg-slate-55 dark:bg-slate-900 border border-slate-300 dark:border-slate-800 rounded-lg px-4 py-2 text-slate-905 dark:text-white focus:outline-none focus:border-indigo-500 transition"
                placeholder="123 Retail Lane, NY"
              />
            </div>
          </div>
        </div>
      }

      <button
        type="submit"
        [disabled]="loading()"
        class="w-full py-3 bg-indigo-600 hover:bg-indigo-750 text-white font-bold rounded-lg shadow-lg hover:shadow-indigo-500/20 transition flex justify-center items-center gap-2 cursor-pointer disabled:opacity-50"
      >
        @if (loading()) {
          <svg class="w-5 h-5 animate-spin" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 1121.21 6.578M3 20v-5h.581"/></svg>
        } @else {
          Register Credentials
        }
      </button>
    </form>

    <p class="text-center text-sm text-slate-500 dark:text-slate-400">
      Already registered? <a routerLink="/login" class="text-indigo-600 dark:text-indigo-400 hover:text-indigo-500 font-semibold">Log In</a>
    </p>
  </div>
</div>
