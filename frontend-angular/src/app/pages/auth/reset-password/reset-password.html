<div class="min-h-[70vh] flex items-center justify-center px-4">
  <div class="glass max-w-md w-full p-8 rounded-2xl shadow-2xl space-y-6">
    <div class="text-center">
      <h2 class="text-3xl font-extrabold text-slate-900 dark:text-white">New Password</h2>
      <p class="text-sm text-slate-500 dark:text-slate-400 mt-2">Enter your new credential settings</p>
    </div>

    @if (error()) {
      <div class="bg-rose-500/15 text-rose-505 dark:text-rose-400 p-3 rounded-lg text-sm text-center font-semibold">{{ error() }}</div>
    }
    @if (success()) {
      <div class="bg-emerald-500/15 text-emerald-600 dark:text-emerald-400 p-3 rounded-lg text-sm text-center font-semibold">{{ success() }}</div>
    }

    <form (ngSubmit)="onSubmit()" class="space-y-4">
      <div>
        <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1">New Password</label>
        <input
          type="password"
          required
          name="password"
          [(ngModel)]="password"
          class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-300 dark:border-slate-800 rounded-lg px-4 py-2 text-slate-905 dark:text-white focus:outline-none focus:border-indigo-500 transition"
          placeholder="Min 6 characters"
        />
      </div>
      <button type="submit" [disabled]="loading()" class="w-full py-2.5 bg-indigo-600 hover:bg-indigo-750 text-white font-bold rounded-lg transition cursor-pointer disabled:opacity-50">
        {{ loading() ? 'Saving password...' : 'Update Password' }}
      </button>
    </form>
  </div>
</div>
