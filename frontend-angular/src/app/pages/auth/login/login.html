<div class="min-h-[80vh] flex items-center justify-center px-4">
  <div class="glass max-w-md w-full p-8 rounded-2xl shadow-2xl space-y-6">
    <div class="text-center space-y-2">
      <div class="inline-flex p-3 bg-indigo-500/10 rounded-full text-indigo-400">
        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.952 11.952 0 01-5.618 1.04C5.063 5.485 4.5 7.42 4.5 9.5c0 4.887 3.013 9.076 7.272 10.742 4.259-1.666 7.272-5.855 7.272-10.742 0-2.08-.563-4.015-1.536-5.472z"/></svg>
      </div>
      <h2 class="text-3xl font-extrabold tracking-tight text-slate-900 dark:text-white">Access Portal</h2>
      <p class="text-sm text-slate-500 dark:text-slate-400">Sign in to manage your orders or inventory</p>
    </div>

    @if (error()) {
      <div class="bg-rose-500/15 border border-rose-500/30 text-rose-500 dark:text-rose-450 text-sm p-3 rounded-lg text-center font-semibold">
        {{ error() }}
      </div>
    }

    <form (ngSubmit)="onSubmit()" class="space-y-4">
      <div>
        <label class="block text-sm font-semibold text-slate-705 dark:text-slate-300 mb-1">Email Address</label>
        <div class="relative">
          <span class="absolute left-3 top-3.5 text-slate-500">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
          </span>
          <input
            type="email"
            required
            name="email"
            [(ngModel)]="email"
            class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-300 dark:border-slate-800 rounded-lg pl-10 pr-4 py-2.5 text-slate-900 dark:text-white placeholder-slate-500 focus:outline-none focus:border-indigo-500 transition"
            placeholder="you@enterprise.com"
          />
        </div>
      </div>

      <div>
        <div class="flex justify-between items-center mb-1">
          <label class="text-sm font-semibold text-slate-705 dark:text-slate-300">Password</label>
          <a routerLink="/forgot-password" class="text-xs text-indigo-600 dark:text-indigo-400 hover:text-indigo-500">Forgot?</a>
        </div>
        <div class="relative">
          <span class="absolute left-3 top-3.5 text-slate-500">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m0 0a2 2 0 01-2 2m0 0a2 2 0 01-2-2m0 0a2 2 0 012-2zm-6 9a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2H9a2 2 0 01-2-2v-4z"/></svg>
          </span>
          <input
            type="password"
            required
            name="password"
            [(ngModel)]="password"
            class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-300 dark:border-slate-800 rounded-lg pl-10 pr-4 py-2.5 text-slate-900 dark:text-white placeholder-slate-500 focus:outline-none focus:border-indigo-500 transition"
            placeholder="••••••••"
          />
        </div>
      </div>

      <button
        type="submit"
        [disabled]="loading()"
        class="w-full py-3 bg-indigo-600 hover:bg-indigo-750 text-white font-bold rounded-lg shadow-lg hover:shadow-indigo-500/20 transition flex justify-center items-center gap-2 cursor-pointer disabled:opacity-50"
      >
        @if (loading()) {
          <svg class="w-5 h-5 animate-spin" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 1121.21 6.578M3 20v-5h.581"/></svg>
        } @else {
          Authenticate Session
        }
      </button>
    </form>

    <p class="text-center text-sm text-slate-500 dark:text-slate-400">
      Need a customer account? <a routerLink="/register" class="text-indigo-600 dark:text-indigo-400 hover:text-indigo-500 font-semibold">Sign Up</a>
    </p>
  </div>
</div>
